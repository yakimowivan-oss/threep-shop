<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Test</title>
    <style>
        #product-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        #product-popup:not(.hidden) {
            display: flex;
        }
        
        #product-popup.hidden {
            display: none !important;
        }
        
        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
        }
        
        .test-button {
            background: red;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Popup Test Page</h1>
    
    <button class="test-button" onclick="showPopup()">Show Popup</button>
    <button class="test-button" onclick="hidePopup()">Hide Popup</button>
    
    <div id="product-popup" class="hidden">
        <div class="popup-content">
            <h2>Test Popup</h2>
            <p>This is a test popup to check if the basic functionality works.</p>
            <button onclick="hidePopup()">Close</button>
        </div>
    </div>
    
    <script>
        function showPopup() {
            console.log('Showing popup...');
            const popup = document.getElementById('product-popup');
            console.log('Popup element:', popup);
            console.log('Popup classes before:', popup.className);
            
            popup.classList.remove('hidden');
            
            console.log('Popup classes after:', popup.className);
            console.log('Popup display style:', window.getComputedStyle(popup).display);
        }
        
        function hidePopup() {
            console.log('Hiding popup...');
            const popup = document.getElementById('product-popup');
            popup.classList.add('hidden');
        }
        
        console.log('Test page loaded');
    </script>
</body>
</html>
