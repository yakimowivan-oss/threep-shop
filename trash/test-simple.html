<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Popup Test</title>
    <style>
        #product-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }
        
        #product-popup.hidden {
            display: none !important;
        }
        
        #product-popup:not(.hidden) {
            display: flex !important;
            justify-content: center;
            align-items: center;
        }
        
        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
        }
        
        .test-button {
            background: red;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Simple Popup Test</h1>
    
    <button class="test-button" onclick="testPopup()">Test Popup Function</button>
    <button class="test-button" onclick="document.getElementById('product-popup').classList.remove('hidden')">Show Popup Direct</button>
    <button class="test-button" onclick="document.getElementById('dynamic-button').click()">Click Dynamic Button</button>
    
    <div id="product-popup" class="hidden">
        <div class="popup-content">
            <h2>Test Popup</h2>
            <p>This is a test popup to check if the basic functionality works.</p>
            <button onclick="document.getElementById('product-popup').classList.add('hidden')">Close</button>
        </div>
    </div>
    
    <button id="dynamic-button" class="test-button" style="background: blue;">Dynamic Button</button>
    
    <script>
        console.log('Simple test page loaded');
        
        function testPopup() {
            console.log('testPopup function called');
            const popup = document.getElementById('product-popup');
            if (popup) {
                popup.classList.remove('hidden');
                console.log('Popup should be visible now');
            } else {
                console.log('Popup element not found!');
            }
        }
        
        // Dynamic button handler
        const dynamicButton = document.getElementById('dynamic-button');
        if (dynamicButton) {
            console.log('Dynamic button found:', dynamicButton);
            dynamicButton.addEventListener('click', function() {
                console.log('Dynamic button clicked!');
                testPopup();
            });
        } else {
            console.log('Dynamic button NOT found!');
        }
        
        console.log('All event listeners set up');
    </script>
</body>
</html>
